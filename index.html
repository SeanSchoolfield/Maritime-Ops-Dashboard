<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title> Draw Test </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="node_modules/ol/ol.css" />
  </head>
  <body>
      <div id="map" class="map"></div>
      <div class="row bottom-controls">
          <div class="col-auto">
              <span class="input-group">
                  <label class="input-group-text" for="type">Geometry type:</label>
                  <select class="form-select" id="type">
                      <option value="None">None</option>
                      <option value="LineString">Line string</option>
                      <option value="Polygon">Polygon</option>
                      <option value="Circle">Circle</option>
                  </select>
                  <input class="form-control" type="button" value="Undo" id="undo" />
                  <button id="select-mode">Enable Selection Mode</button>
                  <button id="delete-selected" disabled>Delete Selected</button>
              </span>
          </div>
      </div>
      <script type="module" src="./main.js"></script>
  </body>
</html>
