<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title> Draw Test </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="node_modules/ol/ol.css" />
    <style>
        .map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="map" class="map"></div>
    <div id="sidenav" class="sidenav">
        <button id="close-sidenav">&times;</button>
        <h2>Filters</h2>
        <p> options go here </p>
    </div>
    <button id="filter-button">Filters</button>

    <div id="zone-sidebar" class="zone-sidebar">
        <p><strong>Zoning Options:</strong></p>
        <label><input type="radio" name="geometry" value="None" checked> None</label><br>
        <label><input type="radio" name="geometry" value="LineString"> Line String</label><br>
        <label><input type="radio" name="geometry" value="Polygon"> Polygon</label><br>
        <label><input type="radio" name="geometry" value="Circle"> Circle</label><br>
        <button id="select-mode">Enable Selection Mode</button>
        <button id="delete-selected" disabled>Delete Selected</button>
        <button id="cancel-selection">Cancel Select Mode</button>
        <button id="undo">Undo </button>
        <!--<button id="close-zone-sidebar">&times;</button>-->
    </div>

    <button id="zone-button">Zones</button>
    <script type="module" src="./main.js"></script>
</body>
</html>
